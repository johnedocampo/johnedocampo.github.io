<!DOCTYPE html>
<html>
<head>
  <title>SourceBuffer.changeType() Demo</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
    }
    #main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 960px;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }
    h1 {
      margin: 0 0 10px 0;
      color: #00e5ff;
      font-size: 2.5rem;
    }
    #codec-display {
      font-size: 1rem;
      color: #e0e0e0;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid #333;
      display: inline-block;
      min-height: 2.5em;
      line-height: 1.4;
    }
    #video-container {
      width: 100%;
      height: 540px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #status-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #fff;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="main-container">
    <header>
      <h1>ChangeType Demo</h1>
      <div id="codec-display">Codec: Detecting...</div>
    </header>

    <div id="video-container">
      <video id="my-video" controls autoplay></video>
      <div id="status-overlay">Status: Idle</div>
    </div>
  </div>

  <!-- Externalized JavaScript -->
  <script src="change-type-demo.js"></script>
</body>
</html>
