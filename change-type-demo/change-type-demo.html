<!DOCTYPE html>
<html>
<head>
  <title>SourceBuffer.changeType() Demo</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: row;
      height: 100vh;
      box-sizing: border-box;
    }
    #video-container {
      flex: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #console-container {
      flex: 1;
      margin-left: 20px;
      display: flex;
      flex-direction: column;
      background-color: #1e1e1e;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 15px;
      box-sizing: border-box;
    }
    h2 {
      margin-top: 0;
      color: #00e5ff;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    #console {
      flex: 1;
      overflow-y: auto;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .log-entry {
      margin-bottom: 8px;
      border-left: 3px solid #555;
      padding-left: 8px;
    }
    .log-info { border-left-color: #00e5ff; }
    .log-success { border-left-color: #00e676; color: #a7ffeb; }
    .log-warn { border-left-color: #ffd600; color: #ffe57f; }
    .log-error { border-left-color: #ff1744; color: #ff8a80; }
    
    #status-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #fff;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="video-container">
    <video id="my-video" controls autoplay></video>
    <div id="status-overlay">Status: Idle</div>
  </div>

  <div id="console-container">
    <h2>Demo Log</h2>
    <div id="console"></div>
  </div>

  <!-- Externalized JavaScript -->
  <script src="change-type-demo.js"></script>
</body>
</html>
