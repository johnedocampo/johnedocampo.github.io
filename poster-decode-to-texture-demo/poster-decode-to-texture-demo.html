<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster Decode To Texture Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 900px;
      width: 90%;
      text-align: center;
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    video {
      width: 100%;
      max-height: 500px;
      border-radius: 8px;
      background-color: #000;
      margin-bottom: 1.5rem;
      /* Remove the default browser outline which is unreliable on TVs */
      outline: none;
    }
    /* The new, highly visible focus style */
    .focused {
        outline: 5px solid orange;
        box-shadow: 0 0 15px orange;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HTMLMediaElement.poster Demo</h1>
    <video id="videoPlayer" poster="sddefault_poster_1.jpg"></video>
  </div>
  <script src="poster-decode-to-texture-demo.js"></script>
</body>
</html>
