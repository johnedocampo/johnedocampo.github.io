<html>
  <head>
    <title>HTMLMediaElement.poster Demo</title>
    <style>
        body {
          margin: 0;
        }

        video {
          width: 100%;
          height: 100%;
        }

        #ui-layer {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: absolute;
          top: 15%;
          height: 85%;
          width: 100%;
          background-color: rgba(33, 33, 33, .75);
          padding: 24px;
          margin: auto;
        }

        .item {
          width: 80%;
          height: 80%;
          display: inline-block;
          margin: 24px;
          vertical-align: middle;
        }
        button {
          margin-top: 20px;
          padding: 10px 20px;
          font-size: 16px;
        }
        button:focus, video:focus {
          outline: 5px solid orange;
          box-shadow: 0 0 15px orange;
        }
    </style>
  </head>
  <body>
    <div id="ui-layer">
      <div class="item">
        <video id="video_player" controls tabindex="0"
               poster="sddefault.jpg"
               src="../big-buck-bunny-vp9-1080p-1mb.webm">
        </video>
      </div>
      <button id="changePosterBtn">Change Poster</button>
    </div>
    <script src="poster-demo.js"></script>
  </body>
</html>
